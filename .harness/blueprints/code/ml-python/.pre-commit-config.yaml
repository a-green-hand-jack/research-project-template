repos:
  - repo: local
    hooks:
      - id: ruff-format-check
        name: ruff format check
        entry: uv run ruff format --check src tests experiments scripts
        language: system
        pass_filenames: false
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check src tests experiments scripts
        language: system
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: uv run pytest tests -v
        language: system
        pass_filenames: false
